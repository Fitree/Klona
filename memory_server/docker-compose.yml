services:
  klona-memory-server:
    build: .
    ports:
      - "32310:8000"
    volumes:
      - ${HOST_VAULT_DIR:-./vault}:/vault
    env_file:
      - .env
    environment:
      - VAULT_DIR=/vault
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
